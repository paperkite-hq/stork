name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci && cd frontend && npm ci

      - name: Lint
        run: npm run lint

      - name: Backend tests with coverage
        run: STORK_FAST_KDF=1 npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=html

      - name: Frontend tests with coverage
        run: cd frontend && npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=html

      - name: Build
        run: npm run build

      - name: Build coverage site
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p _site/backend _site/frontend
          cp -r coverage/* _site/backend/
          cp -r frontend/coverage/* _site/frontend/
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Stork — Code Coverage</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 600px; margin: 80px auto; color: #24292f; }
              h1 { font-size: 1.5rem; }
              a { color: #0969da; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { list-style: none; padding: 0; }
              li { margin: 12px 0; }
              li a { font-size: 1.1rem; }
              .muted { color: #656d76; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <h1>Stork — Code Coverage</h1>
            <p class="muted">Line-by-line coverage reports generated by <a href="https://vitest.dev/">Vitest</a> + V8.</p>
            <ul>
              <li><a href="backend/">Backend (API &amp; core)</a></li>
              <li><a href="frontend/">Frontend (React UI)</a></li>
            </ul>
            <p class="muted">Updated on every push to <code>main</code>.</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(Math.round(c.total.lines.pct))")
          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$COVERAGE" -ge 80 ]; then COLOR="green";
          elif [ "$COVERAGE" -ge 70 ]; then COLOR="yellow";
          else COLOR="red"; fi
          mkdir -p badge
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > badge/coverage.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp badge/coverage.json coverage.json
          git add coverage.json
          git commit -m "Update coverage badge"
          git push origin badges-tmp:badges --force

  deploy-coverage:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci && cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: STORK_FAST_KDF=1 npx playwright test
        env:
          CI: true

  screenshots:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, e2e]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci && cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        run: STORK_FAST_KDF=1 npm run screenshots:generate

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes."
          else
            git commit -m "docs: regenerate screenshots"
            git push
          fi

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t stork .
