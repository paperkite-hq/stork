name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  commit-hygiene:
    name: Commit hygiene check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for Co-Authored-By lines
        run: |
          LEAKED=$(git log --format="%B" HEAD~20..HEAD 2>/dev/null | grep -i "Co-Authored-By:" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Commit messages must not contain Co-Authored-By lines"
            echo "$LEAKED"
            exit 1
          fi
          echo "No Co-Authored-By lines found."
      - name: Check for issue references
        run: |
          # This project does not use GitHub Issues — any #NNN reference is an error
          LEAKED=$(git log --format="%s" HEAD~20..HEAD 2>/dev/null | grep -E '(^|[[:space:](])#[0-9]{1,5}([[:space:])]|$)' || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Commit messages must not contain issue references (#NNN)"
            echo "$LEAKED"
            exit 1
          fi
          echo "No issue references found."

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci && cd frontend && npm ci

      - name: Lint
        run: npm run lint

      - name: Backend tests with coverage
        run: STORK_FAST_KDF=1 npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Frontend tests with coverage
        run: cd frontend && npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Build
        run: npm run build

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(Math.round(c.total.lines.pct))")
          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$COVERAGE" -ge 80 ]; then COLOR="green";
          elif [ "$COVERAGE" -ge 70 ]; then COLOR="yellow";
          else COLOR="red"; fi
          mkdir -p badge
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > badge/coverage.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp badge/coverage.json coverage.json
          git add coverage.json
          git commit -m "Update coverage badge"
          git push origin badges-tmp:badges --force

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci && cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: STORK_FAST_KDF=1 npx playwright test
        env:
          CI: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t stork .
